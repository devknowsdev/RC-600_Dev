id: ref-lom-deviceparameter
object: DeviceParameter
canonical_path: "live_set tracks N devices M parameters L"
summary: "An automatable parameter within a device. Mixer controls, macros, and per-device knobs all surface as DeviceParameter."
source_url: "https://docs.cycling74.com/apiref/lom/deviceparameter/"
verified_in: "12.1"
evidence: official
confidence: high
last_verified: 2026-04-19

children: []

properties:
  - name: automation_state
    type: int
    access: [read, observe]
    notes: "Per official DeviceParameter LOM (`source_url`): 0=no automation, 1=active, 2=overridden — verify mapping stays identical when upgrading Live (enum anchored to published apiref)."
  - name: default_value
    type: float
    access: [read]
    notes: "Only for non-quantized parameters (is_quantized == 0)."
  - name: is_enabled
    type: bool
    access: [read]
    notes: "evidence: mixed — official: 1 when the value can be changed by the user, `live.object` set, automation, or assigned MIDI/keys; 0 when Live blocks direct moves (e.g. macro control, [live.remote~], or other cases Live disallows). inference: we colloquially say 'locked' for 0; the official list in `source_url` is authoritative."
  - name: is_quantized
    type: bool
    access: [read]
    notes: "1 for boolean and enum-style params; 0 for int/float. Some params that look quantized in the UI (e.g. MidiPitch.Pitch) are actually continuous."
  - name: max
    type: float
    access: [read]
  - name: min
    type: float
    access: [read]
  - name: name
    type: symbol
    access: [read]
    notes: "Short name as shown in the closed automation chooser. For Macros, this is the user-assigned name."
  - name: original_name
    type: symbol
    access: [read]
    notes: "For Macro parameters, the generic name before the user assignment (e.g. 'Macro 1')."
  - name: state
    type: int
    access: [read, observe]
    notes: "Per official LOM: 0=active, 1=changeable but inaudible, 2=read-only; same version-anchoring caution as `automation_state`."
  - name: value
    type: float
    access: [read, write, observe]
    notes: "Internal numeric value between min and max. For display, use display_value."
  - name: display_value
    type: symbol
    access: [read, observe]
    notes: "What the user sees in the device panel (e.g. `-6.0 dB`, `1/4`, preset names). evidence: mixed — public apiref still types this as `float` in some builds, but Max/LiveAPI returns GUI text for many parameters; use `str_for_value` / `__str__` if you need a string from a numeric. For continuous dials, display can still look like a float string."
  - name: value_items
    type: StringVector
    access: [read]
    notes: "List of possible value labels. Only for quantized parameters."

functions:
  - name: re_enable_automation
    params: []
    returns: null
    notes: "Re-enables automation for this specific parameter after an override."
  - name: str_for_value
    params:
      - name: value
        type: float
        optional: false
    returns: "symbol — the string representation of the given value"
    notes: "Useful for previewing what a value would display as, without setting it."
  - name: __str__
    params: []
    returns: "symbol — string rep of the current value"

notes: |
  To modulate a parameter at audio rate, do NOT set `value` repeatedly — that
  floods undo and creates an update storm. Instead, send the parameter's object
  ID to [live.remote~], which writes without generating undo entries or
  persisting state. This is the correct pattern for internal modulation. See
  docs/principles/undo-discipline.md.

  The `name` property returns the user-assigned name for Macros. To detect
  whether a Macro has been renamed, compare `name` against `original_name`.

  Not all parameters can be written. Check `is_enabled` and `state` before
  calling set. Writes to disabled parameters silently no-op.

  `value_items` is the mechanism for building a UI that shows the actual string
  labels for enum-style parameters (filter types, LFO waveforms, etc.).
