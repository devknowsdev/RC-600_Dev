id: ref-lom-chain
object: Chain
canonical_path: "live_set tracks N devices M chains P"
summary: "A signal chain inside a Rack. Holds its own devices and a ChainMixerDevice."
source_url: "https://docs.cycling74.com/apiref/lom/chain/"
verified_in: "12.1"

children:
  - name: devices
    type: Device
    cardinality: list
    access: [read, observe]
    notes: "Devices within this chain."
  - name: mixer_device
    type: ChainMixerDevice
    cardinality: one
    access: [read]
    notes: "Chain-local mixer with volume, panning, sends, chain_activator — see chainmixerdevice.yaml."

properties:
  - name: name
    type: symbol
    access: [read, write, observe]
  - name: color
    type: int
    access: [read, write, observe]
  - name: color_index
    type: long
    access: [read, write, observe]
  - name: muted
    type: bool
    access: [read, write, observe]
  - name: solo
    type: bool
    access: [read, write, observe]
  - name: is_auto_selected
    type: bool
    access: [read, observe]
    notes: "For chain selectors based on input value / zone."

functions: []

notes: |
  A chain's devices list does NOT include the chain's mixer_device — that's
  a direct named child, like on Track. Iterate via getcount('devices') for
  the chain's signal-processing devices.

  Muting or soloing a chain via `muted` / `solo` is equivalent to clicking
  the chain's chain_activator or solo button.
