notes: |
  `this_device` is how a Max for Live device refers to its own LOM instance
  without hard-coding track/device indices. Essential when the device must
  find its containing track or its own chain position:

      var me = new LiveAPI("this_device");
      var myId = me.id;
      // walk up via parent navigation or resolve canonical_path

  Official LOM (`source_url`) states the object's class is `Device`, not a
  named `MaxDevice` type in the reference. In practice many M4L patches are
  backed by Max for Live device instances whose concrete UI type behaves like
  MaxDevice — treat that subtype nuance as evidence: inference, confidence:
  medium until confirmed by experiment.

  Use this instead of trying to locate the device by iterating tracks —
  position-based lookup is brittle against user reordering.
