model: rc600_memory_v1

principles:
  - "UI labels come from official documentation first."
  - "XML scope may be broader than confirmed field mappings."
  - "Do not claim exact xml_field unless supported by experiment."
  - "V1 is memory-focused, not full system/global editing."

